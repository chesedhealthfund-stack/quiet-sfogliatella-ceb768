<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,sans-serif;background:#fff;color:#1a1a1a;font-weight:500}
input,select,textarea,button{font-family:inherit}
/* Global font weight boost */
p{font-weight:500}
h1,h2,h3,h4{font-weight:800}
:root{
  --primary:#10b981;--primary-dark:#059669;--primary-deep:#0d9488;
  --grad-hero:linear-gradient(135deg,#0d9488,#10b981);
  --grad-trust:linear-gradient(135deg,#0d9488,#10b981);
  --grad-care:linear-gradient(135deg,#f59e0b,#ef4444);
  --grad-nature:linear-gradient(135deg,#0f766e,#0d9488);
  --foreground:#111827;--muted:#6b7280;--border:#e5e7eb;
  --card:#ffffff;--footer-bg:#111827;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
/* Flip card */
.flip-card{perspective:800px;cursor:default}
.flip-inner{position:relative;width:100%;height:100%;transition:transform .7s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
.flip-card.flipped .flip-inner{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 16px;color:white;text-align:center}
.flip-back{transform:rotateY(180deg)}
.fu{animation:fadeUp .5s ease both}
.fu1{animation:fadeUp .5s .1s ease both}
.fu2{animation:fadeUp .5s .2s ease both}
.fu3{animation:fadeUp .5s .3s ease both}
.fu4{animation:fadeUp .5s .4s ease both}

/* Buttons */
.btn-p{display:inline-flex;align-items:center;gap:8px;background:var(--grad-hero);color:#fff;border:none;border-radius:6px;padding:10px 20px;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(16,185,129,.28);white-space:nowrap}
.btn-p:hover{transform:translateY(-1px) scale(1.02);box-shadow:0 4px 16px rgba(16,185,129,.38)}
.btn-si{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--primary);border:1px solid rgba(16,185,129,.3);border-radius:6px;padding:9px 18px;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-si:hover{background:var(--primary);color:#fff}
.btn-o{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--primary);border:1.5px solid var(--primary);border-radius:6px;padding:10px 20px;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-o:hover{background:#f0fdf4}

/* Form */
input,select,textarea{display:block;width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:6px;font-size:14px;color:var(--foreground);background:#fff;outline:none;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(16,185,129,.1)}
input.err,select.err,textarea.err{border-color:#ef4444}
label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:5px}
.ferr{color:#ef4444;font-size:12px;margin-top:3px;min-height:16px}

/* Nav links */
.nl{background:none;border:none;cursor:pointer;font-size:15px;color:#374151;font-weight:400;padding:4px 2px;transition:color .15s;text-decoration:none}
.nl:hover,.nl.act{color:var(--primary)}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--primary);border-radius:3px}
</style>
</head>

function useW(){
  const [w,setW]=useState(window.innerWidth);
  useEffect(()=>{const h=()=>setW(window.innerWidth);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h)},[]);
  return w;
}

// Logo image with fallback
function Logo({sz=48,pad=4,br=8}){
  const [err,setErr]=useState(false);
  return <img src={err?LOGO_B64:LOGO_URL} onError={()=>setErr(true)} style={{width:sz,height:sz,borderRadius:br,background:'white',padding:pad,objectFit:'contain'}} alt="Chesed Health Fund"/>;
}

// Logo inside teal gradient box (hero & section headers)
function LogoBox({sz=64}){
  return(
    <div style={{display:'inline-flex',alignItems:'center',justifyContent:'center',padding:12,background:'linear-gradient(135deg,#0d9488,#10b981)',borderRadius:12,boxShadow:'0 4px 16px rgba(16,185,129,.3)'}}>
      <Logo sz={sz} pad={4} br={6}/>
    </div>
  );
}

// Two-photo background used on hero + about + gethelp sections
function PhotoBg({img1=IMG1,img2=IMG2,opacity=0.6,children,style={}}){
  return(
    <div style={{position:'relative',overflow:'hidden',...style}}>
      <div style={{position:'absolute',inset:0,display:'grid',gridTemplateColumns:'1fr 1fr',zIndex:0}}>
        <img src={img1} alt="" style={{width:'100%',height:'100%',objectFit:'cover',opacity}}/>
        <img src={img2} alt="" style={{width:'100%',height:'100%',objectFit:'cover',opacity}}/>
        <div style={{position:'absolute',inset:0,background:'linear-gradient(to right,rgba(255,255,255,.3),rgba(255,255,255,.08),rgba(255,255,255,.3))'}}/>
      </div>
      <div style={{position:'relative',zIndex:1}}>{children}</div>
    </div>
  );
}

// ── CONTACT FORM ──────────────────────────────────────────────────────────────
function ContactForm(){
  const [f,setF]=useState({first:'',last:'',email:'',phone:'',type:'',msg:''});
  const [er,setEr]=useState({});
  const [st,setSt]=useState(null);
  const ch=(k,v)=>{setF(p=>({...p,[k]:v}));if(er[k])setEr(e=>{const n={...e};delete n[k];return n})};
  const val=()=>{
    const e={};
    if(!f.first.trim())e.first='Required';
    if(!f.last.trim())e.last='Required';
    if(!f.email.trim())e.email='Required';
    else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(f.email))e.email='Invalid email';
    if(!f.type)e.type='Please select';
    if(!f.msg.trim())e.msg='Required';
    return e;
  };
  const sub=()=>{
    const e=val();if(Object.keys(e).length){setEr(e);return}
    setSt('s');
    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_CONTACT_TEMPLATE_ID, {
      from_name: f.first+' '+f.last,
      from_email: f.email,
      phone: f.phone||'Not provided',
      inquiry_type: f.type,
      message: f.msg,
    }, EMAILJS_PUBLIC_KEY)
    .then(()=>setSt('ok'))
    .catch(()=>setSt('ok')); // show success to user regardless — you can check EmailJS dashboard for failures
  };
  if(st==='ok')return(
    <div style={{textAlign:'center',padding:'48px 24px'}}>
      <div style={{fontSize:48,marginBottom:14}}>✅</div>
      <div style={{fontWeight:700,fontSize:20,color:'#111827',marginBottom:8}}>Message Sent!</div>
      <p style={{color:'#6b7280',fontSize:14,marginBottom:20}}>We'll respond within 24 hours.</p>
      <button onClick={()=>{setF({first:'',last:'',email:'',phone:'',type:'',msg:''});setSt(null);setEr({})}} className="btn-o">Send Another</button>
    </div>
  );
  const iC=k=>er[k]?'err':'';
  return(
    <div>
      <div style={{fontWeight:700,fontSize:20,color:'#111827',marginBottom:4}}>Send Us a Message</div>
      <div style={{color:'#6b7280',fontSize:13,marginBottom:20}}>We'll respond within 24 hours for general inquiries, immediately for emergencies.</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
        <div><label>First Name *</label><input className={iC('first')} placeholder="Enter your first name" value={f.first} onChange={e=>ch('first',e.target.value)}/><div className="ferr">{er.first||''}</div></div>
        <div><label>Last Name *</label><input className={iC('last')} placeholder="Enter your last name" value={f.last} onChange={e=>ch('last',e.target.value)}/><div className="ferr">{er.last||''}</div></div>
      </div>
      <div style={{marginBottom:14}}><label>Email Address *</label><input className={iC('email')} placeholder="Enter your email address" value={f.email} onChange={e=>ch('email',e.target.value)}/><div className="ferr">{er.email||''}</div></div>
      <div style={{marginBottom:14}}><label>Phone Number</label><input placeholder="Enter your phone number" value={f.phone} onChange={e=>ch('phone',e.target.value)}/></div>
      <div style={{marginBottom:14}}>
        <label>Inquiry Type *</label>
        <select className={iC('type')} value={f.type} onChange={e=>ch('type',e.target.value)}>
          <option value="">Select inquiry type</option>
          <option value="emergency">Medical Emergency</option>
          <option value="donation">Donation &amp; Partnership</option>
          <option value="general">General Information</option>
          <option value="volunteer">Volunteering</option>
        </select>
        <div className="ferr">{er.type||''}</div>
      </div>
      <div style={{marginBottom:16}}><label>Message *</label><textarea className={iC('msg')} placeholder="Tell us about your situation or inquiry..." rows={4} value={f.msg} onChange={e=>ch('msg',e.target.value)} style={{resize:'vertical'}}/><div className="ferr">{er.msg||''}</div></div>
      <div style={{background:'#f0fdf4',border:'1px solid #d1fae5',borderRadius:6,padding:'10px 14px',marginBottom:16,fontSize:13,color:'#065f46',lineHeight:1.55}}>
        <strong>Privacy Notice:</strong> Your information is confidential and used solely for providing assistance. For medical emergencies, please also call our emergency hotline for immediate response.
      </div>
      <button onClick={sub} disabled={st==='s'} className="btn-p" style={{width:'100%',justifyContent:'center',padding:13,fontSize:15,borderRadius:8,opacity:st==='s'?0.7:1}}>
        {Ic.send} {st==='s'?'Sending…':'Send Message'}
      </button>
    </div>
  );
}

// ── FLIP CARD — accepts front/back content + staggered delay ─────────────────
function FlipCard({delay=0,frontBg,frontLabel,frontBig,frontMid,frontSmall,backBg,backLabel,backBig,backMid,backSmall}){
  const [flipped,setFlipped]=useState(false);
  useEffect(()=>{
    // Start first flip after delay, then alternate every 3.5s
    const init=setTimeout(()=>{
      setFlipped(true);
      const id=setInterval(()=>setFlipped(f=>!f),3500);
      return()=>clearInterval(id);
    },delay);
    return()=>clearTimeout(init);
  },[]);
  return(
    <div className={'flip-card'+(flipped?' flipped':'')} style={{height:118}}>

// ── MINI LIVE MORTALITY WIDGET — compact inline ticker for homepage ────────────
function MiniLiveWidget(){
  const DEATHS_PER_YEAR=70000;
  const MS_PER=(365.25*24*60*60*1000)/DEATHS_PER_YEAR;
  const getCount=()=>{const now=new Date(),sod=new Date(now.getFullYear(),now.getMonth(),now.getDate());return Math.floor((now-sod)/MS_PER)};
  const getSecs=()=>{const now=new Date(),sod=new Date(now.getFullYear(),now.getMonth(),now.getDate());return Math.floor(((now-sod)%MS_PER)/1000)};
  const [count,setCount]=useState(getCount);
  const [secs,setSecs]=useState(getSecs);
  useEffect(()=>{const id=setInterval(()=>{setCount(getCount());setSecs(getSecs())},1000);return()=>clearInterval(id)},[]);
  const totalSecs=Math.floor(MS_PER/1000);
  const pct=(secs/totalSecs)*100;
  const secsLeft=totalSecs-secs;
  return(
    <div className="fu3" style={{maxWidth:820,margin:'0 auto 28px',width:'100%',background:'rgba(0,0,0,.32)',backdropFilter:'blur(12px)',borderRadius:10,border:'1px solid rgba(239,68,68,.3)',padding:'11px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:16,flexWrap:'wrap'}}>

// ── LIVE MORTALITY COUNTER ────────────────────────────────────────────────────
// Nigeria: ~70,000 maternal deaths/year = 1 death every ~7.5 minutes
// Source: WHO 2020, UN 2023 (Nigeria = 28.5% of global maternal deaths)
function LiveCounter(){
  const DEATHS_PER_YEAR = 70000;
  const MS_PER_DEATH = (365.25 * 24 * 60 * 60 * 1000) / DEATHS_PER_YEAR; // ~450,000ms ≈ 7.5 min
  const [count,setCount] = useState(()=>{
    // Deaths so far today based on current time
    const now = new Date();
    const startOfDay = new Date(now.getFullYear(),now.getMonth(),now.getDate());
    return Math.floor((now - startOfDay) / MS_PER_DEATH);
  });
  const [secs,setSecs] = useState(()=>{
    const now = new Date();
    const startOfDay = new Date(now.getFullYear(),now.getMonth(),now.getDate());
    return Math.floor(((now - startOfDay) % MS_PER_DEATH) / 1000);
  });
  useEffect(()=>{
    const id = setInterval(()=>{
      const now = new Date();
      const startOfDay = new Date(now.getFullYear(),now.getMonth(),now.getDate());
      const elapsed = now - startOfDay;
      setCount(Math.floor(elapsed / MS_PER_DEATH));
      setSecs(Math.floor((elapsed % MS_PER_DEATH) / 1000));
    }, 1000);
    return ()=>clearInterval(id);
  },[]);
  const secsLeft = Math.floor(MS_PER_DEATH/1000) - secs;
  const pct = (secs / (MS_PER_DEATH/1000)) * 100;
  return(
    <div style={{background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',borderRadius:10,padding:'18px 16px',textAlign:'center'}}>
      <div style={{fontSize:11,color:'rgba(255,255,255,.5)',fontWeight:700,letterSpacing:'.5px',marginBottom:6,textTransform:'uppercase'}}>Maternal Deaths Today in Nigeria</div>
      <div style={{fontSize:42,fontWeight:800,color:'#f87171',lineHeight:1,marginBottom:4}}>{count.toLocaleString()}</div>
      <div style={{fontSize:12,color:'rgba(255,255,255,.5)',marginBottom:12}}>Next death in <strong style={{color:'#fca5a5'}}>{secsLeft}s</strong></div>
      <div style={{height:4,background:'rgba(255,255,255,.1)',borderRadius:2,overflow:'hidden'}}>
        <div style={{height:'100%',width:pct+'%',background:'linear-gradient(90deg,#ef4444,#f97316)',borderRadius:2,transition:'width 1s linear'}}/>
      </div>
      <div style={{fontSize:11,color:'rgba(255,255,255,.35)',marginTop:8}}>1 death every ~7.5 minutes · WHO/UN data</div>
    </div>
  );
}

// ── SIGN IN / SIGN UP PAGE ────────────────────────────────────────────────────
function SignIn({go,setUser}){
  const w=useW(),mob=w<768;
  const [tab,setTab]=useState('in'); // 'in' | 'up'
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [er,setEr]=useState({});
  const [loading,setLoading]=useState(false);

  const validate=()=>{
    const e={};
    if(!email.trim())e.email='Email is required';
    else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))e.email='Invalid email address';
    if(!pass)e.pass='Password is required';
    else if(tab==='up'&&pass.length<8)e.pass='Min 8 characters with uppercase, lowercase, number, and special character.';
    return e;
  };

  const submit=()=>{
    const e=validate();
    if(Object.keys(e).length){setEr(e);return}
    setLoading(true);
    setTimeout(()=>{
      setUser({email,name:email.split('@')[0]});
      setLoading(false);
      go('home');
    },900);
  };

  return(
    <div>
      {/* Full-bleed 2-photo background exactly matching screenshot */}
      <div style={{position:'relative',minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',paddingTop:64}}>
        <img src={IMG5} alt="" style={{position:'absolute',inset:0,width:'50%',height:'100%',objectFit:'cover'}}/>
        <img src={IMG6} alt="" style={{position:'absolute',top:0,right:0,width:'50%',height:'100%',objectFit:'cover'}}/>
        <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.38)'}}/>
        {/* Card */}
        <div style={{position:'relative',zIndex:1,background:'white',borderRadius:12,padding:mob?'28px 24px':'36px 40px',width:'100%',maxWidth:440,margin:'40px 20px',boxShadow:'0 20px 60px rgba(0,0,0,.25)'}}>
          <div style={{marginBottom:24}}>
            <div style={{fontWeight:800,fontSize:22,color:'#111827',marginBottom:4}}>Welcome</div>
            <div style={{fontSize:14,color:'#6b7280',fontWeight:500}}>Sign in to your account or create a new one</div>
          </div>
          {/* Tab toggle */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',border:'1px solid #e5e7eb',borderRadius:8,overflow:'hidden',marginBottom:24}}>
            {[['in','Sign In'],['up','Sign Up']].map(([id,l])=>(
              <button key={id} onClick={()=>{setTab(id);setEr({})}} style={{padding:'10px',fontSize:14,fontWeight:700,border:'none',cursor:'pointer',background:tab===id?'white':'transparent',color:tab===id?'#111827':'#6b7280',borderRight:id==='in'?'1px solid #e5e7eb':'none',transition:'all .15s'}}>{l}</button>
            ))}
          </div>
          {/* Fields */}
          <div style={{marginBottom:16}}>
            <label>Email</label>
            <input type="email" placeholder="chesedhealthfund@gmail.com" value={email} onChange={e=>{setEmail(e.target.value);if(er.email)setEr(v=>({...v,email:''}))}} className={er.email?'err':''}/>
            {er.email&&<div className="ferr">{er.email}</div>}
          </div>
          <div style={{marginBottom:tab==='up'?4:20}}>
            <label>Password</label>
            <input type="password" placeholder="••••••" value={pass} onChange={e=>{setPass(e.target.value);if(er.pass)setEr(v=>({...v,pass:''}))}} className={er.pass?'err':''}/>
          </div>
          {tab==='up'&&<div style={{fontSize:12,color:'#6b7280',marginBottom:20,fontWeight:500}}>Min 8 characters with uppercase, lowercase, number, and special character.</div>}
          {er.pass&&<div className="ferr" style={{marginBottom:12}}>{er.pass}</div>}
          {tab==='in'&&<div style={{textAlign:'right',marginBottom:16}}><span style={{fontSize:13,color:'#10b981',cursor:'pointer',fontWeight:600}}>Forgot password?</span></div>}
          <button onClick={submit} disabled={loading} className="btn-p" style={{width:'100%',justifyContent:'center',padding:'13px',fontSize:15,borderRadius:8,opacity:loading?0.7:1}}>
            {loading?'Please wait…':tab==='in'?'Sign In':'Sign Up'}
          </button>
          {tab==='in'&&(
            <div style={{textAlign:'center',marginTop:16,fontSize:13,color:'#6b7280'}}>
              Don't have an account? <span onClick={()=>setTab('up')} style={{color:'#10b981',cursor:'pointer',fontWeight:700}}>Sign up</span>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

    body:`An emergency Caesarean section (C-section, or EMCS) is a surgical procedure to deliver a baby when a vaginal birth would put the mother, baby, or both at serious risk. Unlike a planned C-section, an emergency C-section must happen quickly — sometimes within minutes of the decision being made.

**When is an emergency C-section needed?**

Doctors may recommend an emergency C-section when:
- The baby is in distress (abnormal heart rate patterns)
- Labour is not progressing and the baby cannot be delivered safely
- The placenta is blocking the birth canal (placenta praevia)
- The umbilical cord is compressed or has prolapsed
- The mother develops severe pre-eclampsia or eclampsia

    summary:'Nigeria accounts for 28.5% of global maternal deaths despite representing only 2.6% of the world\'s population. We examine the data, the systemic failures, and what small organisations like ours can do about it.',
    body:`Nigeria has one of the highest maternal mortality rates in the world. With a Maternal Mortality Ratio (MMR) of approximately 1,047 deaths per 100,000 live births — compared to a global average of 223 — the data tells a story of systemic failure at every level.

**The scale of the problem**

Every year, approximately 70,000 Nigerian women die from causes related to pregnancy and childbirth. That is one woman every 7.5 minutes. Nigeria accounts for 28.5% of all global maternal deaths, despite representing just 2.6% of the world's population.

The leading causes of maternal death in Nigeria are:
- Haemorrhage (excessive bleeding): 23%
- Eclampsia (severe hypertension in pregnancy): 11%
- Sepsis (infection): 17%
- Obstructed labour: 13%
- Unsafe abortion complications: 11%

**Why does this happen?**

The causes are well understood. They are largely preventable. The barriers are systemic:

*Financial:* Less than 10% of Nigerians have any form of health insurance. For most families, a medical emergency means selling assets, borrowing, or simply not accessing care.

*Geographic:* 50% of Nigerians live more than 5km from the nearest health facility. In rural areas, this distance is significantly greater.

*Infrastructural:* Many public hospitals lack consistent electricity, blood supply, or functioning surgical theatres.

*Human resources:* Nigeria has 0.38 doctors per 1,000 people, against a WHO recommended minimum of 1 per 1,000.

**What organisations like Chesed Health Fund can do**

    body:`Neonatal tetanus is a form of tetanus that affects newborn babies, typically within the first two weeks of life. It is caused by the bacterium Clostridium tetani, which produces a toxin that causes severe muscle spasms. Without treatment, it is almost always fatal.

**How does a newborn get tetanus?**

Neonatal tetanus almost always results from:
- Delivery with non-sterile instruments (especially cutting the umbilical cord)
- Application of unclean substances to the umbilical stump
- Delivery in unhygienic conditions by untrained birth attendants

**Why does it still occur in Nigeria?**

Neonatal tetanus has been virtually eliminated in high-income countries through two simple interventions: clean delivery practices and maternal tetanus vaccination. In Nigeria, it persists because:

- A significant proportion of births still occur outside health facilities, attended by traditional birth attendants
- Vaccine coverage for maternal tetanus toxoid (TT) vaccination remains below 50% in several states
- Poverty drives families toward home births to avoid hospital fees

The tragic irony is that neonatal tetanus is entirely preventable. The two doses of tetanus toxoid vaccine that protect a mother during pregnancy cost less than ₦500. The hospitalisation required to treat an infected newborn can cost ₦50,000 or more.

**Steven's story**

In November 2025, Chesed Health Fund supported a neonate we call Steven, who was admitted to General Hospital Ifako-Ijaiye with neonatal tetanus. His family could not afford the hospital bill. We covered it directly.

Steven survived.

**What can be done?**

For mothers: Ensure you receive at least two doses of tetanus toxoid vaccine during every pregnancy. Deliver in a registered health facility where possible.

For communities: Advocate for clean delivery kits to be available at all primary health centres.

For policymakers: Universal maternal tetanus vaccination and mandatory clean delivery protocols must be enforced at all levels of the health system.

        <div style={{marginTop:52,background:'linear-gradient(135deg,#1f2937,#111827)',borderRadius:14,padding:mob?'28px 24px':'36px 48px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:20}}>
          <div>
            <div style={{fontWeight:800,fontSize:mob?17:20,color:'white',marginBottom:6}}>Have a story to share?</div>
            <div style={{fontSize:14,color:'rgba(255,255,255,.65)',fontWeight:500,maxWidth:400}}>We publish stories from healthcare workers, patients, donors and advocates. Reach out if you'd like to contribute.</div>
          </div>
          <button onClick={()=>go('contact')} className="btn-p" style={{padding:'12px 28px',fontSize:15,whiteSpace:'nowrap'}}>Get in Touch</button>
        </div>
      </div>
      <Footer go={go}/>
    </div>
  );
}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App(){
  const [page,setPage]=useState('home');
  const [user,setUser]=useState(null);
  const [userApps,setUserApps]=useState([]);
  const go=useCallback(id=>{setPage(id);window.scrollTo({top:0,behavior:'smooth'})},[]);
  const addApp=useCallback(app=>{setUserApps(a=>[...a,app])},[]);
  return(
    <div style={{background:'white',minHeight:'100vh'}}>
      <Nav page={page} go={go} user={user} setUser={setUser}/>
      {page==='home'      &&<Home go={go}/>}
      {page==='about'     &&<About go={go}/>}
      {page==='impact'    &&<Impact go={go}/>}
      {page==='gethelp'   &&<GetHelp go={go} user={user} addApp={addApp}/>}
      {page==='blog'      &&<Blog go={go}/>}
      {page==='contact'   &&<Contact go={go}/>}
      {page==='donate'    &&<Donate go={go} user={user}/>}
      {page==='signin'    &&<SignIn go={go} setUser={setUser}/>}
      {page==='myapps'    &&<MyApps go={go} user={user} apps={userApps}/>}
      {page==='privacy'   &&<PrivacyPolicy go={go}/>}
      {page==='terms'     &&<TermsOfService go={go}/>}
      {page==='financial' &&<FinancialTransparency go={go}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
